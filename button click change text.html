<!DOCTYPE html>
<html>
<head>
    <title>Button Click Change Text</title>
</head>
<body>

<h2 id="text">Hello World</h2>

<!-- Button -->
<button onclick="changeText()">Click Me</button>

<script>
function changeText() {

    // Select the text
    let element = document.getElementById("text");

    // Change the text
    element.innerHTML = "Text Changed!";
}
</script>

</body>
</html>
